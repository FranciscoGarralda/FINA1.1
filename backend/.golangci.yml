# Conjunto inicial conservador. Ejecutar desde backend/: golangci-lint run ./...
# Instalar v2: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.0
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    # Equivalente a issues.exclude-use-default: false (v1): sin exclusiones por preset.
    presets: []
